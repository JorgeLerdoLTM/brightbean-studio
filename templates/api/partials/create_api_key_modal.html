{# "Create API Key" form modal — opens via showCreateModal Alpine state in the parent. #}
<template x-teleport="body">
    <div x-show="showCreateModal" x-transition.opacity
         class="fixed inset-0 z-50 flex items-center justify-center"
         style="background: rgba(0,0,0,0.4);">
        <div @click.outside="showCreateModal = false"
             x-show="showCreateModal"
             x-transition
             class="w-full max-w-lg rounded-xl shadow-xl flex flex-col max-h-[90vh]"
             style="background: var(--surface-0);">

            <div class="flex items-center justify-between px-6 py-4 flex-shrink-0" style="border-bottom: 1px solid var(--border);">
                <h3 class="text-base font-semibold" style="color: var(--text-primary);">Create API Key</h3>
                <button @click="showCreateModal = false" class="cursor-pointer" style="color: var(--text-tertiary);">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>

            <form hx-post="{{ create_action_url }}"
                  hx-target="#new-api-key-token-slot"
                  hx-swap="innerHTML"
                  @htmx:after-request.camel.window="if(event.detail.successful) { showCreateModal = false; showTokenModal = true; }"
                  class="px-6 py-5 overflow-y-auto">
                {% csrf_token %}

                <div class="mb-5">
                    <label for="key-name" class="block text-sm font-medium mb-1.5" style="color: var(--text-primary);">Name</label>
                    <input type="text" id="key-name" name="name" required maxlength="100"
                           placeholder='e.g. "Printio content agent"'
                           class="input-focus w-full px-4 py-2.5 text-sm rounded-lg outline-none transition-all"
                           style="border: 1px solid var(--border); color: var(--text-primary); background: var(--surface-1);">
                    <p class="text-xs mt-1" style="color: var(--text-tertiary);">Visible only in this list. Use a name that identifies the agent or environment.</p>
                </div>

                {% if is_org_scope_page %}
                <div class="mb-5">
                    <label class="block text-sm font-medium mb-1.5" style="color: var(--text-primary);">Scope</label>
                    <p class="text-xs mb-3" style="color: var(--text-tertiary);">Pick which library the key can write into.</p>
                    <select name="workspace_id"
                            class="input-focus w-full px-4 py-2.5 text-sm rounded-lg outline-none transition-all"
                            style="border: 1px solid var(--border); color: var(--text-primary); background: var(--surface-1);">
                        <option value="">Org-shared (writes into the shared library)</option>
                        {% for ws in workspaces_for_scope_picker %}
                            <option value="{{ ws.id }}">{{ ws.name }} (workspace)</option>
                        {% endfor %}
                    </select>
                </div>
                {% endif %}

                <div class="rounded-lg p-3 mb-5" style="background: var(--warning-50); border: 1px solid #FDE68A;">
                    <p class="text-xs" style="color: #92400E;">
                        <strong>The token is shown exactly once</strong> right after creation. Copy it
                        immediately and save it somewhere secure (env var, .env file, or secret manager).
                    </p>
                </div>

                <div class="flex justify-end gap-3">
                    <button type="button" @click="showCreateModal = false"
                            class="btn-neutral px-5 py-2 text-sm font-medium rounded-full cursor-pointer transition-colors"
                            style="background: var(--neutral-100); color: var(--text-primary);">
                        Cancel
                    </button>
                    <button type="submit"
                            class="btn-opacity px-5 py-2 text-sm font-medium rounded-full cursor-pointer transition-colors"
                            style="background: var(--primary); color: white;">
                        Create
                    </button>
                </div>
            </form>
        </div>
    </div>
</template>
