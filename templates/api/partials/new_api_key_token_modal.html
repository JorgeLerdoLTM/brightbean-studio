{# One-shot reveal modal. Rendered into #new-api-key-token-slot after create.
   Alpine flips showTokenModal=true when the create response lands. #}
<template x-teleport="body">
    <div x-show="showTokenModal" x-transition.opacity
         class="fixed inset-0 z-50 flex items-center justify-center"
         style="background: rgba(0,0,0,0.4);"
         x-data="{ copied: false }">
        <div x-show="showTokenModal"
             x-transition
             class="w-full max-w-lg rounded-xl shadow-xl flex flex-col max-h-[90vh]"
             style="background: var(--surface-0);">

            <div class="flex items-center justify-between px-6 py-4 flex-shrink-0" style="border-bottom: 1px solid var(--border);">
                <h3 class="text-base font-semibold" style="color: var(--text-primary);">Your new API key</h3>
            </div>

            <div class="px-6 py-5 overflow-y-auto">
                <p class="text-sm mb-4" style="color: var(--text-secondary);">
                    Key <strong>{{ key.name }}</strong> created. Copy the token below — <strong>it
                    will not be shown again</strong>.
                </p>

                <div class="mb-5">
                    <label class="block text-xs font-medium mb-1.5 uppercase tracking-wider" style="color: var(--text-tertiary);">Token</label>
                    <div class="flex gap-2">
                        <input type="text" readonly value="{{ raw_token }}"
                               x-ref="tokenInput"
                               @click="$refs.tokenInput.select()"
                               class="w-full px-4 py-2.5 text-sm rounded-lg outline-none"
                               style="border: 1px solid var(--border); color: var(--text-primary); background: var(--neutral-50); font-family: var(--font-mono);">
                        <button type="button"
                                @click="navigator.clipboard.writeText('{{ raw_token }}'); copied = true; setTimeout(() => copied = false, 2000)"
                                class="btn-opacity px-4 py-2 text-sm font-medium rounded-lg cursor-pointer transition-colors flex-shrink-0"
                                style="background: var(--primary); color: white;">
                            <span x-show="!copied">Copy</span>
                            <span x-show="copied">Copied!</span>
                        </button>
                    </div>
                </div>

                <div class="rounded-lg p-3 mb-5" style="background: var(--info-50); border: 1px solid #BFDBFE;">
                    <p class="text-xs" style="color: var(--info-700);">
                        <strong>How to use:</strong> set this as <code style="font-family: var(--font-mono);">BRIGHTBEAN_API_KEY</code>
                        in the agent's environment (or <code>~/.config/brightbean-agent/.env</code> file)
                        along with the <code>BRIGHTBEAN_URL</code> of this deployment. See
                        <code>docs/setup-new-agent.md</code> for the full setup.
                    </p>
                </div>

                <div class="flex justify-end">
                    <button type="button"
                            @click="showTokenModal = false; window.location.reload()"
                            class="btn-opacity px-5 py-2 text-sm font-medium rounded-full cursor-pointer transition-colors"
                            style="background: var(--primary); color: white;">
                        Done
                    </button>
                </div>
            </div>
        </div>
    </div>
</template>
